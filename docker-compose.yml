version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: zetheta-postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zetheta
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: zetheta-redis
    restart: always
    ports:
      - "6379:6379"